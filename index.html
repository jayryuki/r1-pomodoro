<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#11100e">
  <title>Turnodoro</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="timer-screen" aria-labelledby="stageName">
      <header>
        <h1 id="stageName">Focus 1</h1>
        <button id="settingsButton" class="icon-button" type="button" aria-label="Open settings">⚙</button>
      </header>
      <output id="time" class="time">25:00</output>
      <div id="positions" class="positions" aria-label="Timer position">
        <svg class="position active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <svg class="position" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
        <svg class="position" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <svg class="position" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </div>
      <p id="status" class="status">Stand R1 on an edge</p>
      <p id="debug" class="debug"></p>
      <button id="soundButton" class="sound-button" type="button" hidden>Enable sound</button>
    </section>

    <section id="settings" class="settings" aria-labelledby="settingsTitle" hidden>
      <header><h2 id="settingsTitle">Timer settings</h2></header>
      <form id="settingsForm" novalidate>
        <label>Focus 1 <input id="duration0" type="number" min="1" step="1" inputmode="numeric"></label>
        <label>Short break <input id="duration1" type="number" min="1" step="1" inputmode="numeric"></label>
        <label>Focus 2 <input id="duration2" type="number" min="1" step="1" inputmode="numeric"></label>
        <label>Long break <input id="duration3" type="number" min="1" step="1" inputmode="numeric"></label>
        <p id="settingsError" class="error" role="alert"></p>
        <div class="settings-actions">
          <button type="submit">Save</button>
          <button id="cancelButton" type="button">Cancel</button>
          <button id="restoreButton" type="button">Defaults</button>
          <button id="calibrateButton" type="button">Calibrate</button>
        </div>
      </form>
    </section>
  </main>
  <script src="./js/bundle.js"></script>
</body>
</html>
